<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 380px; font-family: system-ui; padding: 12px; }
    button { width: 100%; padding: 10px; margin: 8px 0; }
    pre { background: #f5f5f5; padding: 10px; font-size: 12px; max-height: 200px; overflow: auto; }
    textarea { width: 100%; height: 120px; font-family: monospace; }
  </style>
</head>
<body>
  <h3>LocalCode Bridge</h3>
  <label> LocalCode Port: <input id="port" value="9876" size="6"></label>

  <button id="run">Execute JS in Active Tab</button>
  <pre id="output"></pre>

  <script src="popup.js"></script>
</body>
</html>
